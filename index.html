<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Affaire n°1 — D906 | Votre verdict</title>
<meta name="description" content="Le coupable ne conduit pas la GX-778-WK — soumettez votre plaque. La carte grise vous répondra.">
<style>
  :root{--bg:#12100e;--paper:#1c1916;--ink:#e8e2d6;--dim:#9a917f;--red:#b3402e;--stamp:#7a2f22;--ok:#5a7a4a;--line:#3a352d}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font-family:Georgia,'Times New Roman',serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
  .dossier{background:var(--paper);border:1px solid var(--line);max-width:560px;width:100%;padding:40px 34px;position:relative}
  .dossier::before{content:"DOSSIER N° 2024-D906-114";position:absolute;top:14px;right:16px;font-size:11px;letter-spacing:2px;color:var(--dim)}
  .tag{font-size:12px;letter-spacing:3px;color:var(--dim);text-transform:uppercase;margin-bottom:10px}
  h1{font-size:26px;font-weight:normal;line-height:1.3;margin-bottom:6px}
  h1 b{color:var(--red)}
  .sub{color:var(--dim);font-style:italic;font-size:15px;margin-bottom:30px}
  .hr{border-top:1px dashed var(--line);margin:26px 0}
  label{display:block;font-size:13px;letter-spacing:2px;text-transform:uppercase;color:var(--dim);margin-bottom:10px}
  .row{display:flex;gap:10px}
  input{flex:1;background:#0d0b09;border:1px solid var(--line);color:var(--ink);font-family:'Courier New',monospace;font-size:22px;letter-spacing:3px;padding:14px 16px;text-transform:uppercase;text-align:center;outline:none}
  input:focus{border-color:var(--dim)}
  button{background:var(--stamp);border:none;color:var(--ink);font-family:Georgia,serif;font-size:15px;letter-spacing:2px;padding:14px 22px;cursor:pointer;text-transform:uppercase}
  button:hover{background:var(--red)}
  #verdict{margin-top:26px;padding:22px;border:1px solid var(--line);display:none;font-size:16px;line-height:1.65;white-space:pre-line}
  #verdict.bad{border-color:var(--line);color:var(--dim)}
  #verdict.warm{border-color:var(--stamp);color:var(--ink)}
  #verdict.win{border-color:var(--ok);color:var(--ink);background:#15181280}
  .stamp{display:inline-block;border:3px double var(--red);color:var(--red);padding:6px 14px;letter-spacing:4px;font-size:18px;transform:rotate(-4deg);margin-bottom:14px}
  .stampok{border-color:var(--ok);color:#8fb87a}
  .foot{margin-top:30px;font-size:12px;color:var(--dim);text-align:center;font-style:italic}
  .count{font-size:12px;color:var(--dim);margin-top:10px;text-align:right}
</style>
</head>
<body>
<div class="dossier">
  <div class="tag">Gendarmerie nationale — copie officieuse</div>
  <h1>Le coupable ne conduit pas la <b>GX-778-WK</b></h1>
  <div class="sub">Affaire n°1 — Délit de fuite sur la D906. Théo Vasseur, 16 ans.</div>

  <label for="plate">Soumettez la plaque du coupable</label>
  <div class="row">
    <input id="plate" maxlength="9" placeholder="AA-000-AA" autocomplete="off" spellcheck="false">
    <button onclick="check()">Accuser</button>
  </div>
  <div class="count" id="count"></div>
  <div id="verdict"></div>

  <div class="foot">La solution ne figure pas dans le livre — ni dans le code de cette page.<br>Une question sur un indice ? Écrivez-nous sur Instagram.</div>
</div>

<script>
const R = {
 "3ab6787d16c9d6620d667a0f5b9cae2e6c7191cde417755e010789d6b1a43e65": {c:"win", t:"COUPABLE", m:
`FK-778-VR — berline grise, teinte « Gris Lunaire ».

Extrait du fichier des cartes grises :
Titulaire : Denis CHASTEL, 47 ans, Charnay-lès-Mâcon (Saône-et-Loire).

Le véhicule a été retrouvé dans une grange, sous une bâche. L'aile avant droite repeinte à la bombe. Sur la lunette arrière, l'autocollant du garage était toujours là — à demi décollé, la ville en capitales bleues.

Interpellé le lendemain à 6h14, Denis Chastel a reconnu les faits avant même la fin de la garde à vue.

L'adjudante-cheffe Morel a pu partir à la retraite. Elle vous remercie.

Pour Théo. — Affaire classée.

L'Affaire n°2 est déjà ouverte.`},
 "1cc03f884fd9349a945d8b5bac7a49e23f0567c3305b9d82cb7c9fc9e945c5d5": {c:"warm", t:"RELISEZ LA COUVERTURE", m:
`GX-778-WK ?

Enquêteur… le titre du dossier vous l'a dit dès le premier jour.

Vous êtes à un souffle de la vérité. Deux voitures. Deux départements. Un détail, quelque part dans le procès-verbal, les sépare. Relisez la déposition de Ruben Carvalho — chaque mot.`},
 "67a08426957b05780c2ddb9c3e075c9329f5d0ff655573cc6b0f5ea8c46a00cd": {c:"warm", t:"SI PROCHE", m:`Cette berline a survécu jusqu'à la pièce n°11. Le chiffre du milieu ne correspond pas à celui du fils du maire. Reprenez le recoupement du radar.`},
 "4a503657ede4e53863906be5239aba85c9a16325084c4d917e94ac93e6874721": {c:"warm", t:"SI PROCHE", m:`Presque. Relisez la pièce n°10 — le témoin est formel sur le dernier chiffre.`},
 "235a404104fe6319c67d8ae29518db2b18f8a1edf02ddf3609e0911fba4b7551": {c:"warm", t:"SI PROCHE", m:`Ce département n'a jamais vendu la teinte « Gris Lunaire ». Reprenez la pièce n°12.`},
 "27f5e1162a3e87ab4ac7dc9a07532bfebed60f4ff0ce1651d7bc5c9c344c3184": {c:"warm", t:"SI PROCHE", m:`L'expertise finale de l'image est catégorique sur le premier chiffre. Pièce n°13.`},
 "c6673c08fe624366a530600aa163bddd5dce69e9e7cf22c17a0d68a8d7cb1310": {c:"warm", t:"SI PROCHE", m:`La dernière trame vidéo vous contredit sur le troisième chiffre. Pièce n°14.`},
 "b7fab93804a6de18db539e2241a8cfc8f49269bb700add25f0981eb93c84a9e6": {c:"warm", t:"TÉMOIN, PAS SUSPECT", m:`C'est la berline du fils du maire. Elle vous sert de référence — pièce n°11 — mais elle était garée devant la mairie à 23h37. Douze témoins.`}
};
const fmt = v => {
  const s = v.toUpperCase().replace(/[^A-Z0-9]/g,"");
  let out = s.slice(0,2);
  if (s.length>2) out += "-"+s.slice(2,5);
  if (s.length>5) out += "-"+s.slice(5,7);
  return out;
};
const inp = document.getElementById("plate");
inp.addEventListener("input", e => e.target.value = fmt(e.target.value));
inp.addEventListener("keydown", e => { if(e.key==="Enter") check(); });
let tries = 0;
async function check(){
  const v = inp.value.trim().toUpperCase();
  const box = document.getElementById("verdict");
  if(!/^[A-Z]{2}-\d{3}-[A-Z]{2}$/.test(v)){
    box.className="bad"; box.style.display="block";
    box.innerHTML="Format attendu : deux lettres, trois chiffres, deux lettres. Exemple : AB-123-CD.";
    return;
  }
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(v));
  const hex = [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,"0")).join("");
  const r = R[hex];
  tries++;
  document.getElementById("count").textContent = tries>1 ? tries+" accusations portées" : "";
  box.style.display="block";
  if(r){
    box.className = r.c;
    box.innerHTML = '<div class="stamp'+(r.c==="win"?" stampok":"")+'">'+r.t+"</div>\n"+r.m;
  } else {
    box.className="bad";
    box.innerHTML = "<div class='stamp'>NON-LIEU</div>\nCette plaque figure peut-être au fichier — mais ce n'est pas elle. Un innocent vous remercie de le rayer.\n\nReprenez les pièces du dossier. Les indices ne mentent jamais.";
  }
}
</script>
</body>
</html>
